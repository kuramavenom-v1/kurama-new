<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قيادات - Kurama</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background-color: #0A0A0A; color: #E0E0E0; margin: 0; padding: 0; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; text-align: center; }
        .ranks-section { padding: 40px 0; background-color: #151515; min-height: 100vh; }
        .rank-card { background-color: #1A1A1A; border-radius: 15px; margin: 0 auto 30px auto; box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); border: 2px solid #FFD700; overflow: hidden; width: 100%; }
        .image-container { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; background-color: #000; }
        .rank-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .rank-content-text { padding: 25px; background: #1A1A1A; border-top: 2px solid #FFD700; }
        .rank-card .name { color: #FFD700; font-size: 2.5em; margin: 10px 0; font-weight: bold; }
        
        /* ستايل النائب */
        .vampire-card { border-color: #C0C0C0; box-shadow: 0 0 20px rgba(192, 192, 192, 0.3); }
        .vampire-card .name { color: #C0C0C0; }
        .vampire-card .rank-content-text { border-top: 2px solid #C0C0C0; }
        
        /* ستايل المستشار */
        .kaneki-card { border-color: #8B0000; box-shadow: 0 0 20px rgba(139, 0, 0, 0.5); }
        .kaneki-card .name { color: #FF0000; text-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }
        .kaneki-card .rank-content-text { border-top: 2px solid #8B0000; }

        .back-button { display: inline-block; margin-bottom: 20px; padding: 10px 25px; color: #FFD700; text-decoration: none; border: 1px solid #FFD700; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button">← العودة للرئيسية</a>
        <section class="ranks-section">
            <h2 style="color: #FFD700; margin-bottom: 30px;">رتب كوروما؟</h2>
            
            <div class="rank-card">
                <div class="image-container"><img src="./images/v_king_final.jpg"></div>
                <div class="rank-content-text">
                    <div style="color:#AAA">الـمـؤسـس</div>
                    <div class="name">VENoM</div>
                </div>
            </div>

            <div class="rank-card vampire-card">
                <div class="image-container"><img src="./images/vampire_rank.jpg"></div>
                <div class="rank-content-text">
                    <div style="color:#AAA">نائب الـمـؤسـس</div>
                    <div class="name">FLOxAN</div>
                </div>
            </div>
                    
        </section>
    </div>
</body>
</html>
